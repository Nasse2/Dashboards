<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sävsjö Kommun - Socialförvaltning Dashboard</title>
<style>
    :root {
        --primary: #005a9c;
        --primary-dark: #004273;
        --primary-light: #e8f1f8;
        --bg: #f4f6f9;
        --card-bg: #ffffff;
        --text: #333;
        --muted: #666;
        --border: #d5d5d5;
        --danger: #9f2a2a;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 20px;
        background: var(--bg);
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
    }

    .container {
        max-width: 1300px;
        margin: auto;
    }

    header {
        text-align: center;
        margin-bottom: 28px;
    }

    h1 {
        margin: 0 0 6px;
        color: var(--primary);
    }

    header p {
        margin: 0;
        color: var(--muted);
    }

    .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 24px;
        border-bottom: 2px solid var(--primary);
        padding-bottom: 10px;
    }

    .tab-btn {
        border: none;
        background: #d9d9d9;
        color: #444;
        padding: 12px 18px;
        border-radius: 6px 6px 0 0;
        cursor: pointer;
        font-weight: 700;
        transition: background 0.2s, color 0.2s;
    }

    .tab-btn:hover,
    .tab-btn:focus-visible {
        background: #cfcfcf;
        outline: 2px solid transparent;
    }

    .tab-btn.active {
        background: var(--primary);
        color: #fff;
    }

    .tab-content {
        display: none;
    }

    .tab-content.active {
        display: block;
    }

    .toolbar {
        background: var(--primary-light);
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .toolbar label {
        font-weight: 700;
        color: var(--primary);
    }

    .toolbar select {
        padding: 10px;
        border-radius: 5px;
        border: 1px solid var(--border);
        min-width: min(100%, 290px);
        background: #fff;
    }

    .info {
        margin-bottom: 20px;
        color: var(--muted);
        font-style: italic;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
    }

    .card {
        background: var(--card-bg);
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        border-top: 5px solid var(--primary);
        min-height: 178px;
        display: flex;
        flex-direction: column;
    }

    .card h3 {
        margin: 0;
        font-size: 1rem;
        line-height: 1.4;
        color: #555;
    }

    .kpi-id {
        margin-top: 8px;
        color: #777;
        font-size: 0.82rem;
    }

    .value {
        font-size: 2.15rem;
        font-weight: 800;
        color: var(--primary);
        margin: 14px 0 8px;
        min-height: 48px;
        line-height: 1.1;
    }

    .year {
        color: #777;
        font-size: 0.92rem;
        margin-top: auto;
    }

    .status {
        color: var(--muted);
        font-size: 0.9rem;
        margin-top: 6px;
    }

    .sparkline {
        width: 100%;
        height: 72px;
        margin: 6px 0 12px;
    }

    .compare-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 20px;
    }

    .comparison-card {
        background: var(--card-bg);
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        border-top: 5px solid var(--primary);
    }

    .comparison-card h3 {
        margin: 0 0 14px;
        color: #555;
        font-size: 1rem;
    }

    .comparison-chart {
        width: 100%;
        height: 260px;
        margin-bottom: 14px;
    }

    .chart-tooltip {
        position: fixed;
        z-index: 20;
        display: none;
        pointer-events: none;
        max-width: 230px;
        padding: 9px 11px;
        border-radius: 6px;
        background: rgba(24, 32, 44, 0.94);
        color: #fff;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.22);
        font-size: 0.86rem;
        line-height: 1.35;
    }

    .chart-tooltip strong {
        display: block;
        margin-bottom: 3px;
    }

    .comparison-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
    }

    .comparison-table th,
    .comparison-table td {
        border-bottom: 1px solid var(--border);
        padding: 10px 8px;
        text-align: left;
    }

    .comparison-table th {
        color: var(--primary-dark);
        font-weight: 700;
    }

    .comparison-table td:nth-child(2),
    .comparison-table td:nth-child(3) {
        white-space: nowrap;
    }

    .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.88rem;
    }

    .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font: inherit;
        padding: 0;
    }

    .legend-color {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        display: inline-block;
    }

    .legend-item.is-muted {
        opacity: 0.35;
    }

    .comparison-table button {
        border: 0;
        background: transparent;
        color: var(--primary);
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 0;
        text-align: left;
    }

    .comparison-table tr.is-muted {
        opacity: 0.45;
    }

    .comparison-table tr.is-highlighted {
        background: #f0f7fc;
    }

    .section-comparison {
        margin-top: 22px;
    }

    .error .value {
        color: var(--danger);
        font-size: 1.25rem;
    }

    .source {
        margin-top: 24px;
        color: #777;
        font-size: 0.88rem;
    }

    @media (max-width: 640px) {
        body {
            padding: 14px;
        }

        .tab-btn {
            flex: 1 1 100%;
            border-radius: 6px;
        }

        .grid {
            grid-template-columns: 1fr;
        }

        .comparison-table {
            font-size: 0.86rem;
        }
    }
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>Sävsjö Kommun</h1>
        <p>Dashboard Kolada</p>
    </header>

    <nav class="tabs" aria-label="Områden">
        <button class="tab-btn active" type="button" data-tab="lss">LSS</button>
        <button class="tab-btn" type="button" data-tab="ekonomi">Ekonomiskt bistånd</button>
        <button class="tab-btn" type="button" data-tab="aldreomsorg">Äldreomsorg</button>
        <button class="tab-btn" type="button" data-tab="halsa">Hälso- och sjukvård</button>
        <button class="tab-btn" type="button" data-tab="jamforelser">Jämförelser</button>
    </nav>

    <main>
        <section id="lss" class="tab-content active" aria-labelledby="LSS">
            <div class="toolbar">
                <label for="lss-select">Välj LSS-enhet:</label>
                <select id="lss-select" data-unit-filter="lss">
                    <option value="">Hela Sävsjö kommun</option>
                </select>
            </div>
            <div class="grid" data-grid="lss"></div>
            <div class="section-comparison" data-comparison-panel="compare-lss"></div>
        </section>

        <section id="ekonomi" class="tab-content" aria-labelledby="Ekonomiskt bistånd">
            <div class="info">Detta område visas på kommunnivå.</div>
            <div class="grid" data-grid="ekonomi"></div>
            <div class="section-comparison" data-comparison-panel="compare-ekonomi"></div>
        </section>

        <section id="aldreomsorg" class="tab-content" aria-labelledby="Äldreomsorg">
            <div class="toolbar">
                <label for="elder-select">Välj verksamhet:</label>
                <select id="elder-select" data-unit-filter="elder">
                    <option value="">Hela Sävsjö kommun</option>
                </select>
            </div>
            <div class="grid" data-grid="aldreomsorg"></div>
            <div class="section-comparison" data-comparison-panel="compare-aldreomsorg"></div>
        </section>

        <section id="halsa" class="tab-content" aria-labelledby="Hälso- och sjukvård">
            <div class="info">Detta område visas på kommunnivå.</div>
            <div class="grid" data-grid="halsa"></div>
            <div class="section-comparison" data-comparison-panel="compare-halsa"></div>
        </section>

        <section id="jamforelser" class="tab-content" aria-labelledby="Jämförelser">
            <div class="toolbar">
                <label for="comparison-select">Välj nyckeltal:</label>
                <select id="comparison-select"></select>
            </div>
            <div class="compare-layout">
                <article class="comparison-card">
                    <h3 id="comparison-title">Jämförelse mellan kommuner</h3>
                    <canvas class="comparison-chart" id="comparison-chart" width="900" height="260"></canvas>
                    <div class="legend" id="comparison-legend"></div>
                    <table class="comparison-table">
                        <thead>
                            <tr>
                                <th>Kommun</th>
                                <th>Senaste värde</th>
                                <th>Mätår</th>
                                <th>Förändring från året innan</th>
                            </tr>
                        </thead>
                        <tbody id="comparison-table-body">
                            <tr><td colspan="4">Laddar...</td></tr>
                        </tbody>
                    </table>
                </article>
            </div>
        </section>
    </main>

    <p class="source">Källa: Kolada API v3. Värdena hämtas vid sidladdning och uppdateras när en enhet väljs.</p>
</div>
<div class="chart-tooltip" id="chart-tooltip" role="status" aria-live="polite"></div>

        ],
        ekonomi: [

            },
            {
                id: "N31872",

            },
            {

            }
        ],
        aldreomsorg: [
            {

                title: "Brukarbedömning hemtjänst - helhetssyn",

            },
            {

            {

            }
        ],
        halsa: [
            {
                id: "N20402",
                title: "Fallskador bland personer 80+",
                format: "number",
                unit: false
            },
            {
                id: "N21701",
                title: "Invånare 65+ med hemtjänst",
                format: "percent",
                unit: false
            },
            {
                id: "N20036",
                title: "Årsarbetare, kommunalt anställda sjuksköterskor",
                format: "number",
                unit: false
            },
            {
                id: "N20434",
                title: "Fallskador 80+, vårdtillfällen per 100 000 invånare",
                format: "number",
                unit: false
            },
            {
                id: "N20030",
                title: "Månadsavlönade kommunalt anställda sjuksköterskor",
                format: "number",
                unit: false
            },
            {
                id: "N20001",
                title: "Kostnad äldre och funktionsnedsättning per invånare",
                format: "currency",
                unit: false
            },
            {
                id: "N20011",
                title: "Nettokostnad äldre och funktionsnedsättning per invånare",
                format: "currency",
                unit: false
            }
        ]
    };

    const comparisonKpis = Object.values(dashboards).flat();

    const chartTooltipData = new WeakMap();
    const comparisonPanels = new Map();
    const selectedMunicipalityByPanel = new Map();

    document.querySelectorAll(".tab-btn").forEach(button => {
        button.addEventListener("click", () => activateTab(button.dataset.tab));
    });

    document.querySelectorAll("[data-unit-filter]").forEach(select => {
        select.addEventListener("change", () => renderDashboard(select.dataset.unitFilter === "lss" ? "lss" : "aldreomsorg"));
    });

    document.getElementById("comparison-select").addEventListener("change", () => renderComparison("main-comparison"));

    init();

    async function init() {
        renderAllCards();
        renderEmbeddedComparisonPanels();
        registerComparisonPanel("main-comparison", {
            selectId: "comparison-select",
            titleId: "comparison-title",
            chartId: "comparison-chart",
            legendId: "comparison-legend",
            tableBodyId: "comparison-table-body",
            kpis: comparisonKpis
        });
        renderComparisonOptions("main-comparison");
        await loadUnits();
        await Promise.all(Object.keys(dashboards).map(renderDashboard));
        await Promise.all([...comparisonPanels.keys()].map(renderComparison));
    }

    function activateTab(tabId) {
        document.querySelectorAll(".tab-btn").forEach(button => {
            button.classList.toggle("active", button.dataset.tab === tabId);
        });

        document.querySelectorAll(".tab-content").forEach(tab => {
            tab.classList.toggle("active", tab.id === tabId);
        });
    }

    function renderAllCards() {
        Object.entries(dashboards).forEach(([area, cards]) => {
            const grid = document.querySelector(`[data-grid="${area}"]`);
            grid.innerHTML = cards.map(card => `
                <article class="card" id="kpi-${card.id}">
                    <h3>${card.title}</h3>
                    <div class="kpi-id">${card.id}</div>
                    <div class="value">Laddar...</div>
                    <div class="status"></div>
                    <canvas class="sparkline" width="320" height="72" aria-hidden="true"></canvas>
                    <div class="year"></div>
                </article>
            `).join("");
        });
    }

    function renderEmbeddedComparisonPanels() {
        const titles = {
            lss: "Jämförelse LSS",
            ekonomi: "Jämförelse ekonomiskt bistånd",
            aldreomsorg: "Jämförelse äldreomsorg",
            halsa: "Jämförelse hälso- och sjukvård"
        };

        Object.entries(dashboards).forEach(([area, kpis]) => {
            const panelId = `compare-${area}`;
            const target = document.querySelector(`[data-comparison-panel="${panelId}"]`);
            if (!target) return;

            target.innerHTML = `
                <div class="toolbar">
                    <label for="${panelId}-select">${titles[area]}:</label>
                    <select id="${panelId}-select"></select>
                </div>
                <article class="comparison-card">
                    <h3 id="${panelId}-title">Jämförelse mellan kommuner</h3>
                    <canvas class="comparison-chart" id="${panelId}-chart" width="900" height="260"></canvas>
                    <div class="legend" id="${panelId}-legend"></div>
                    <table class="comparison-table">
                        <thead>
                            <tr>
                                <th>Kommun</th>
                                <th>Senaste värde</th>
                                <th>Mätår</th>
                                <th>Förändring från året innan</th>
                            </tr>
                        </thead>
                        <tbody id="${panelId}-table-body">
                            <tr><td colspan="4">Laddar...</td></tr>
                        </tbody>
                    </table>
                </article>
            `;

            registerComparisonPanel(panelId, {
                selectId: `${panelId}-select`,
                titleId: `${panelId}-title`,
                chartId: `${panelId}-chart`,
                legendId: `${panelId}-legend`,
                tableBodyId: `${panelId}-table-body`,
                kpis
            });
            renderComparisonOptions(panelId);
            document.getElementById(`${panelId}-select`).addEventListener("change", () => renderComparison(panelId));
        });
    }

    function registerComparisonPanel(panelId, config) {
        comparisonPanels.set(panelId, config);
    }

    function renderComparisonOptions(panelId) {
        const panel = comparisonPanels.get(panelId);
        const select = document.getElementById(panel.selectId);
        select.innerHTML = panel.kpis.map(card => `<option value="${card.id}">${card.title}</option>`).join("");
    }

    async function loadUnits() {
        try {
            const data = await fetchJson(`${API_BASE}/ou?municipality=${MUNICIPALITY_ID}`);
            const units = data.values || [];
            populateUnitSelect("lss-select", units, unitGroups.lss);
            populateUnitSelect("elder-select", units, unitGroups.elder);
        } catch (error) {
            setSelectError("lss-select");
            setSelectError("elder-select");
        }
    }

    function populateUnitSelect(selectId, units, prefixes) {
        const select = document.getElementById(selectId);
        const filtered = units
            .filter(unit => prefixes.some(prefix => unit.id.startsWith(prefix)))
            .sort((a, b) => a.title.localeCompare(b.title, "sv"));

        filtered.forEach(unit => {
            const option = document.createElement("option");
            option.value = unit.id;
            option.textContent = unit.title;
            select.appendChild(option);
        });
    }

    function setSelectError(selectId) {
        const select = document.getElementById(selectId);
        const option = document.createElement("option");
        option.textContent = "Kunde inte hämta enheter";
        option.disabled = true;
        select.appendChild(option);
    }

    async function renderDashboard(area) {
        const ouId = selectedOuForArea(area);
        const requests = dashboards[area].map(card => updateCard(card, ouId));
        await Promise.all(requests);
    }

    function selectedOuForArea(area) {
        if (area === "lss") return document.getElementById("lss-select").value;
        if (area === "aldreomsorg") return document.getElementById("elder-select").value;
        return "";
    }

    async function updateCard(cardConfig, ouId) {
        const card = document.getElementById(`kpi-${cardConfig.id}`);
        setCardLoading(card);

        try {
            const useOuData = cardConfig.unit && ouId;
            const path = useOuData
                ? `/oudata/kpi/${cardConfig.id}/ou/${ouId}`
                : `/data/municipality/${MUNICIPALITY_ID}/kpi/${cardConfig.id}`;
            const data = await fetchJson(`${API_BASE}${path}`);
            const latest = latestValidValue(data.values || []);
            const series = valuesByYear(data.values || []);

            if (!latest) {
                setCardNoData(card, useOuData);
                return;
            }

            setCardValue(card, latest, cardConfig, useOuData);
            drawLineChart(card.querySelector(".sparkline"), [{ title: "Sävsjö", color: "#005a9c", values: series }], cardConfig.format, false);
        } catch (error) {
            setCardError(card);
        }
    }

    async function fetchJson(url) {
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`Kolada svarade ${response.status}`);
        }
        return response.json();
    }

    function latestValidValue(rows) {
        return valuesByYear(rows).slice().sort((a, b) => b.period - a.period)[0] || null;
    }

    function valuesByYear(rows) {
        return rows
            .map(row => {
                const value = (row.values || []).find(item => item.gender === "T" && item.value !== null)
                    || (row.values || []).find(item => item.value !== null);
                return value ? { period: Number(row.period), value: Number(value.value), status: value.status || "" } : null;
            })
            .filter(Boolean)
            .filter(point => point.period >= START_YEAR)
            .sort((a, b) => a.period - b.period);
    }

    function setCardLoading(card) {
        card.classList.remove("error");
        card.querySelector(".value").textContent = "Laddar...";
        card.querySelector(".status").textContent = "";
        card.querySelector(".year").textContent = "";
        clearCanvas(card.querySelector(".sparkline"));
    }

    function setCardValue(card, latest, cardConfig, isUnit) {
        card.classList.remove("error");
        card.querySelector(".value").textContent = formatValue(latest.value, cardConfig.format);
        card.querySelector(".status").textContent = latest.status ? `Status: ${latest.status}` : "";
        card.querySelector(".year").textContent = `Mätår: ${latest.period}${isUnit ? " (enhet)" : " (kommun)"}`;
    }

    function setCardNoData(card, isUnit) {
        card.classList.add("error");
        card.querySelector(".value").textContent = "Ingen data";
        card.querySelector(".status").textContent = isUnit
            ? "Kolada saknar värde för vald enhet."
            : "Kolada saknar kommunvärde för nyckeltalet.";
        card.querySelector(".year").textContent = "";
        clearCanvas(card.querySelector(".sparkline"));
    }

    function setCardError(card) {
        card.classList.add("error");
        card.querySelector(".value").textContent = "Kunde inte hämta";
        card.querySelector(".status").textContent = "Kontrollera internetanslutning eller API-svar.";
        card.querySelector(".year").textContent = "";
        clearCanvas(card.querySelector(".sparkline"));
    }

    function formatValue(value, format) {
        if (format === "currency") {
            return `${Math.round(value).toLocaleString("sv-SE")} kr`;
        }

        if (format === "percent") {
            return `${value.toLocaleString("sv-SE", { maximumFractionDigits: 1 })}%`;
        }

        return value.toLocaleString("sv-SE", { maximumFractionDigits: 1 });
    }

    async function renderComparison(panelId) {
        const panel = comparisonPanels.get(panelId);
        if (!panel) return;

        const selectedId = document.getElementById(panel.selectId).value || panel.kpis[0].id;
        const kpi = panel.kpis.find(item => item.id === selectedId) || panel.kpis[0];
        const tbody = document.getElementById(panel.tableBodyId);
        const title = document.getElementById(panel.titleId);
        title.textContent = kpi.title;
        tbody.innerHTML = `<tr><td colspan="4">Laddar...</td></tr>`;

        try {
            const rows = await Promise.all(comparisonMunicipalities.map(async municipality => {
                const data = await fetchJson(`${API_BASE}/data/municipality/${municipality.id}/kpi/${kpi.id}`);
                return { ...municipality, values: valuesByYear(data.values || []) };
            }));

            panel.rows = rows;
            panel.format = kpi.format;
            drawLineChart(document.getElementById(panel.chartId), rows, kpi.format, true, selectedMunicipalityByPanel.get(panelId));
            renderComparisonLegend(panelId, rows);
            renderComparisonTable(panelId, rows, kpi.format);
        } catch (error) {
            clearCanvas(document.getElementById(panel.chartId));
            document.getElementById(panel.legendId).innerHTML = "";
            tbody.innerHTML = `<tr><td colspan="4">Kunde inte hämta jämförelsedata från Kolada.</td></tr>`;
        }
    }

    function renderComparisonLegend(panelId, rows) {
        const panel = comparisonPanels.get(panelId);
        const selected = selectedMunicipalityByPanel.get(panelId);
        document.getElementById(panel.legendId).innerHTML = rows.map(row => `
            <button class="legend-item ${selected && selected !== row.id ? "is-muted" : ""}" type="button" data-panel="${panelId}" data-municipality="${row.id}">
                <span class="legend-color" style="background:${row.color}"></span>
                ${row.title}
            </button>
        `).join("");

        document.querySelectorAll(`#${panel.legendId} [data-municipality]`).forEach(button => {
            button.addEventListener("click", () => toggleMunicipalityHighlight(panelId, button.dataset.municipality));
        });
    }

    function renderComparisonTable(panelId, rows, format) {
        const panel = comparisonPanels.get(panelId);
        const selected = selectedMunicipalityByPanel.get(panelId);
        document.getElementById(panel.tableBodyId).innerHTML = rows.map(row => {
            const first = row.values[0];
            const latest = row.values[row.values.length - 1];
            const previous = row.values[row.values.length - 2];
            const rowClass = selected === row.id ? "is-highlighted" : selected ? "is-muted" : "";
            const nameButton = `<button type="button" data-panel="${panelId}" data-municipality="${row.id}">${row.title}</button>`;

            if (!latest) {
                return `<tr class="${rowClass}"><td>${nameButton}</td><td>Ingen data</td><td></td><td></td></tr>`;
            }

            const change = previous && previous.period !== latest.period
                ? latest.value - previous.value
                : null;
            const changeText = change === null
                ? ""
                : `${change > 0 ? "+" : ""}${formatValue(change, format)}`;

            return `
                <tr class="${rowClass}">
                    <td>${nameButton}</td>
                    <td>${formatValue(latest.value, format)}</td>
                    <td>${latest.period}</td>
                    <td>${changeText}</td>
                </tr>
            `;
        }).join("");

        document.querySelectorAll(`#${panel.tableBodyId} [data-municipality]`).forEach(button => {
            button.addEventListener("click", () => toggleMunicipalityHighlight(panelId, button.dataset.municipality));
        });
    }

    function toggleMunicipalityHighlight(panelId, municipalityId) {
        const current = selectedMunicipalityByPanel.get(panelId);
        if (current === municipalityId) {
            selectedMunicipalityByPanel.delete(panelId);
        } else {
            selectedMunicipalityByPanel.set(panelId, municipalityId);
        }

        const panel = comparisonPanels.get(panelId);
        if (!panel || !panel.rows) return;

        drawLineChart(
            document.getElementById(panel.chartId),
            panel.rows,
            panel.format,
            true,
            selectedMunicipalityByPanel.get(panelId)
        );
        renderComparisonLegend(panelId, panel.rows);
        renderComparisonTable(panelId, panel.rows, panel.format);
    }

    function drawLineChart(canvas, series, format, showAxes, highlightedId = "") {
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const width = canvas.width;
        const height = canvas.height;
        const padding = showAxes ? 48 : 8;
        const rightPadding = showAxes ? 18 : 8;
        const bottomPadding = showAxes ? 42 : 10;
        const allPoints = series.flatMap(item => item.values);

        ctx.clearRect(0, 0, width, height);
        chartTooltipData.set(canvas, { points: [], format });
        setupChartTooltip(canvas);
        if (allPoints.length < 2) return;

        const minYear = Math.min(...allPoints.map(point => point.period));
        const maxYear = Math.max(...allPoints.map(point => point.period));
        const rawMinValue = Math.min(...allPoints.map(point => point.value));
        const rawMaxValue = Math.max(...allPoints.map(point => point.value));
        const yTicks = getYAxisTicks(rawMinValue, rawMaxValue, format);
        const minValue = yTicks[0];
        const maxValue = yTicks[yTicks.length - 1];
        const valueSpan = maxValue - minValue || 1;
        const yearSpan = maxYear - minYear || 1;
        const chartWidth = width - padding - rightPadding;
        const chartHeight = height - padding - bottomPadding;

        const xFor = year => padding + ((year - minYear) / yearSpan) * chartWidth;
        const yFor = value => padding + chartHeight - ((value - minValue) / valueSpan) * chartHeight;

        if (showAxes) {
            ctx.font = "12px Segoe UI, Arial";
            ctx.textBaseline = "middle";

            yTicks.forEach(tick => {
                const y = yFor(tick);
                ctx.strokeStyle = "#e4e8ed";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(padding + chartWidth, y);
                ctx.stroke();

                ctx.fillStyle = "#666";
                ctx.textAlign = "right";
                ctx.fillText(formatAxisValue(tick, format), padding - 8, y);
            });

            ctx.textAlign = "center";
            ctx.textBaseline = "top";
            for (let year = minYear; year <= maxYear; year += 1) {
                const x = xFor(year);
                ctx.strokeStyle = "#eef1f4";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x, padding);
                ctx.lineTo(x, padding + chartHeight);
                ctx.stroke();

                ctx.fillStyle = "#666";
                ctx.fillText(String(year), x, padding + chartHeight + 12);
            }

            ctx.strokeStyle = "#d5d5d5";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, padding + chartHeight);
            ctx.lineTo(padding + chartWidth, padding + chartHeight);
            ctx.stroke();
        }

        const tooltipPoints = [];

        series.forEach(item => {
            if (item.values.length < 2) return;
            const muted = highlightedId && item.id !== highlightedId;
            ctx.strokeStyle = item.color;
            ctx.globalAlpha = muted ? 0.18 : 1;
            ctx.lineWidth = highlightedId && item.id === highlightedId ? 4 : showAxes ? 2.5 : 2;
            ctx.beginPath();
            item.values.forEach((point, index) => {
                const x = xFor(point.period);
                const y = yFor(point.value);
                tooltipPoints.push({
                    x,
                    y,
                    color: item.color,
                    title: item.title,
                    period: point.period,
                    value: point.value
                });
                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            const last = item.values[item.values.length - 1];
            ctx.fillStyle = item.color;
            ctx.beginPath();
            ctx.arc(xFor(last.period), yFor(last.value), highlightedId && item.id === highlightedId ? 5 : showAxes ? 4 : 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        });

        chartTooltipData.set(canvas, { points: tooltipPoints, format });
    }

    function clearCanvas(canvas) {
        if (!canvas) return;
        canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
        chartTooltipData.set(canvas, { points: [], format: "number" });
    }

    function formatAxisValue(value, format) {
        if (format === "currency") return `${Math.round(value).toLocaleString("sv-SE")} kr`;
        if (format === "percent") return `${value.toLocaleString("sv-SE", { maximumFractionDigits: 0 })}%`;
        return value.toLocaleString("sv-SE", { maximumFractionDigits: 0 });
    }

    function getYAxisTicks(minValue, maxValue, format) {
        if (format === "percent") {
            const start = Math.floor(minValue / 10) * 10;
            const end = Math.ceil(maxValue / 10) * 10;
            const ticks = [];
            for (let value = start; value <= end; value += 10) {
                ticks.push(value);
            }
            return ticks.length > 1 ? ticks : [start, start + 10];
        }

        const range = maxValue - minValue || Math.max(Math.abs(maxValue), 1);
        const step = niceNumber(range / 5);
        const start = Math.floor(minValue / step) * step;
        const end = Math.ceil(maxValue / step) * step;
        const ticks = [];
        for (let value = start; value <= end + step * 0.5; value += step) {
            ticks.push(Number(value.toFixed(8)));
        }
        return ticks.length > 1 ? ticks : [start, start + step];
    }

    function niceNumber(value) {
        const exponent = Math.floor(Math.log10(value));
        const fraction = value / Math.pow(10, exponent);
        let niceFraction = 1;

        if (fraction <= 1) niceFraction = 1;
        else if (fraction <= 2) niceFraction = 2;
        else if (fraction <= 5) niceFraction = 5;
        else niceFraction = 10;

        return niceFraction * Math.pow(10, exponent);
    }

    function setupChartTooltip(canvas) {
        if (canvas.dataset.tooltipReady === "true") return;
        canvas.dataset.tooltipReady = "true";

        canvas.addEventListener("mousemove", event => {
            const tooltip = document.getElementById("chart-tooltip");
            const state = chartTooltipData.get(canvas);
            if (!state || !state.points.length) {
                hideChartTooltip();
                return;
            }

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (event.clientX - rect.left) * scaleX;
            const mouseY = (event.clientY - rect.top) * scaleY;

            let nearest = state.points
                .map(point => ({
                    ...point,
                    distance: Math.hypot(point.x - mouseX, point.y - mouseY),
                    xDistance: Math.abs(point.x - mouseX)
                }))
                .sort((a, b) => a.distance - b.distance)[0];

            const hitRadius = canvas.classList.contains("sparkline") ? 34 : 20;
            if (!nearest || nearest.distance > hitRadius) {
                const xRadius = canvas.classList.contains("sparkline") ? 24 : 34;
                nearest = state.points
                    .map(point => ({
                        ...point,
                        distance: Math.hypot(point.x - mouseX, point.y - mouseY),
                        xDistance: Math.abs(point.x - mouseX)
                    }))
                    .sort((a, b) => a.xDistance - b.xDistance)[0];

                if (!nearest || nearest.xDistance > xRadius) {
                    canvas.style.cursor = "default";
                    hideChartTooltip();
                    return;
                }
            }

            if (!nearest) {
                canvas.style.cursor = "default";
                hideChartTooltip();
                return;
            }

            canvas.style.cursor = "crosshair";
            tooltip.innerHTML = `
                <strong>${nearest.title}</strong>
                År: ${nearest.period}<br>
                Värde: ${formatValue(nearest.value, state.format)}
            `;
            tooltip.style.left = `${Math.min(event.clientX + 14, window.innerWidth - 245)}px`;
            tooltip.style.top = `${Math.max(event.clientY - 52, 10)}px`;
            tooltip.style.display = "block";
        });

        canvas.addEventListener("mouseleave", () => {
            canvas.style.cursor = "default";
            hideChartTooltip();
        });
    }

    function hideChartTooltip() {
        document.getElementById("chart-tooltip").style.display = "none";
    }
</script>
